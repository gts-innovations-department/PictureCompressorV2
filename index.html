<!DOCTYPE html>
<html lang="en" class="bg-white text-gray-900">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GTS Photo Compressor — Under 27MB</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/heic-to@1.4.2/dist/iife/heic-to.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    canvas { display: none; }
    .progress-bar {
      transition: width 0.4s ease-in-out;
    }
  </style>
</head>
<body class="min-h-screen bg-white">

  <div class="max-w-4xl mx-auto px-6 py-16 text-center">
    <!-- Header -->
    <div class="mb-12">
      <h1 class="text-5xl font-bold text-gray-900">GTS Photo Compressor</h1>
      <p class="mt-3 text-xl text-gray-600">Compress your photos to stay under any target size — 100% private & in-browser</p>
    </div>

    <!-- Upload Button -->
    <div id="uploadArea">
      <input type="file" id="folderInput" webkitdirectory directory multiple class="hidden" onchange="handleFolder(event)">
      <button onclick="document.getElementById('folderInput').click()"
              class="bg-blue-600 hover:bg-blue-700 text-white px-12 py-6 rounded-2xl text-2xl font-semibold shadow-lg transition-all hover:scale-105 active:scale-95">
        📂 Select Folder of Photos
      </button>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="hidden fixed inset-0 bg-white/95 backdrop-blur-md z-50 flex items-center justify-center">
      <div class="w-full max-w-md px-6">
        <div class="mx-auto w-16 h-16 border-4 border-gray-200 border-t-blue-600 rounded-full animate-spin mb-6"></div>
        
        <p id="loadingTitle" class="text-2xl font-semibold text-gray-800 mb-2">Loading & Processing...</p>
        <p id="loadingSubtitle" class="text-gray-600 mb-8">Converting HEIC files and finding best quality</p>
        
        <!-- Progress Bar -->
        <div class="bg-gray-200 h-3 rounded-full overflow-hidden mb-3">
          <div id="progressBar" class="progress-bar bg-blue-600 h-3 rounded-full w-0"></div>
        </div>
        <p id="progressText" class="font-mono text-sm text-gray-500">0%</p>
      </div>
    </div>

    <!-- Result -->
    <div id="result" class="hidden mt-16">
      <div class="bg-white border border-green-200 rounded-3xl shadow-sm p-12">
        <p class="text-green-600 font-medium uppercase tracking-widest text-sm mb-3">Ready to Download</p>
        <p id="optimalQuality" class="text-8xl font-bold text-gray-900">95%</p>
        <p class="mt-4 text-2xl text-gray-600">Quality • New total size</p>
        <p id="newTotal" class="text-6xl font-bold text-green-600 mt-1">12.4 MB</p>

        <button onclick="compressAndDownload()"
                class="mt-12 w-full max-w-md mx-auto bg-green-600 hover:bg-green-700 text-white font-bold py-6 rounded-2xl text-xl shadow-lg transition-all hover:scale-[1.02]">
          ⬇️ Download Compressed ZIP
        </button>
      </div>
    </div>
  </div>

  <script>
    let loadedImages = [];
    let optimalQuality = 1.0;
    let targetMB = 27;

    function isImageFile(file) {
      const ext = file.name.toLowerCase();
      return /\.(jpg|jpeg|png|heic|heif|webp|gif|bmp)$/i.test(ext) || file.type.startsWith('image/');
    }

    async function handleFolder(e) {
      const files = Array.from(e.target.files).filter(isImageFile);
      if (files.length === 0) {
        alert("No image files found in the selected folder.");
        return;
      }

      // Hide upload, show loading
      document.getElementById('uploadArea').classList.add('hidden');
      document.getElementById('loadingOverlay').classList.remove('hidden');
      document.getElementById('result').classList.add('hidden');

      loadedImages = [];
      let processed = 0;
      let skipped = 0;

      // === 1. Load and convert images ===
      for (const file of files) {
        processed++;
        const percent = Math.round((processed / files.length) * 40); // First 40% for loading
        updateProgress(percent, `Loading images... (${processed}/${files.length})`);

        let blob = file;
        let displayName = file.name;

        const isHeic = await HeicTo.isHeic(file).catch(() => false);
        if (isHeic) {
          try {
            blob = await HeicTo({ blob: file, type: 'image/jpeg', quality: 0.98 });
            displayName = displayName.replace(/\.(heic|heif)$/i, '.jpg');
          } catch (err) {
            console.error(`HEIC failed: ${file.name}`, err);
            skipped++;
            continue;
          }
        }

        const url = URL.createObjectURL(blob);
        const img = new Image();
        img.src = url;

        await new Promise(r => { img.onload = r; img.onerror = () => { skipped++; r(); }; });

        if (img.naturalWidth === 0) {
          skipped++;
          URL.revokeObjectURL(url);
          continue;
        }

        loadedImages.push({
          name: displayName.replace(/\.\w+$/i, '.jpg'),
          origSize: file.size,
          img: img,
          preloadUrl: url
        });
      }

      if (loadedImages.length === 0) {
        alert("No valid images could be loaded.");
        resetUI();
        return;
      }

      // === 2. Automatically find optimal quality ===
      updateProgress(45, "Finding best compression quality...");

      const targetBytes = targetMB * 1024 * 1024;
      const origTotal = loadedImages.reduce((sum, i) => sum + i.origSize, 0);

      if (origTotal <= targetBytes) {
        optimalQuality = 1.0;
        showResult(1.0, origTotal);
        return;
      }

      let low = 0.1, high = 1.0;
      let bestQ = 0.1;
      let bestTotal = Infinity;

      for (let i = 0; i < 12; i++) {
        const mid = (low + high) / 2;
        const total = await getTotalSize(mid);
        const progress = 45 + Math.round((i + 1) / 12 * 55); // 45% → 100%

        updateProgress(progress, `Testing quality ${Math.round(mid * 100)}%`);

        if (total <= targetBytes) {
          bestQ = mid;
          bestTotal = total;
          low = mid;
        } else {
          high = mid;
        }
      }

      optimalQuality = Math.max(bestQ, 0.1);
      showResult(optimalQuality, bestTotal);
    }

    function updateProgress(percent, message) {
      document.getElementById('progressBar').style.width = percent + '%';
      document.getElementById('progressText').textContent = percent + '%';
      document.getElementById('loadingTitle').textContent = message;
    }

    async function getTotalSize(quality) {
      const items = await getCompressedBlobs(quality);
      return items.reduce((sum, i) => sum + i.size, 0);
    }

    async function getCompressedBlobs(quality) {
      return Promise.all(loadedImages.map(async item => {
        const canvas = document.createElement('canvas');
        canvas.width = item.img.width;
        canvas.height = item.img.height;
        canvas.getContext('2d').drawImage(item.img, 0, 0);
        const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', quality));
        return { name: item.name, blob, size: blob.size };
      }));
    }

    function showResult(q, totalBytes) {
      document.getElementById('loadingOverlay').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      const totalMB = (totalBytes / 1024 / 1024).toFixed(1);
      document.getElementById('optimalQuality').textContent = Math.round(q * 100) + '%';
      document.getElementById('newTotal').textContent = `${totalMB} MB`;
    }

    async function compressAndDownload() {
      const btn = document.querySelector('#result button');
      const originalText = btn.innerHTML;
      btn.innerHTML = '⏳ Creating ZIP...';
      btn.disabled = true;

      const items = await getCompressedBlobs(optimalQuality);
      const zip = new JSZip();
      items.forEach(item => zip.file(item.name, item.blob));

      const zipBlob = await zip.generateAsync({ type: 'blob' });
      const url = URL.createObjectURL(zipBlob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `compressed_photos_under_${targetMB}MB.zip`;
      a.click();
      URL.revokeObjectURL(url);

      setTimeout(() => {
        btn.innerHTML = originalText;
        btn.disabled = false;
      }, 1200);
    }

    function resetUI() {
      document.getElementById('uploadArea').classList.remove('hidden');
      document.getElementById('loadingOverlay').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
    }

    // Cleanup memory
    window.addEventListener('beforeunload', () => {
      loadedImages.forEach(item => URL.revokeObjectURL(item.preloadUrl));
    });
  </script>
</body>
</html>
