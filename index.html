<!DOCTYPE html>
<html lang="en" class="bg-white text-gray-900">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GTS Photo Compressor — Under 27MB</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/heic-to@1.4.2/dist/iife/heic-to.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    canvas { display: none; }
    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #3b82f6;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="min-h-screen bg-white">
  <div class="max-w-5xl mx-auto px-6 py-12">
    <!-- Header -->
    <div class="text-center mb-12">
      <h1 class="text-4xl md:text-5xl font-bold text-gray-900">GTS Photo Compressor</h1>
      <p class="mt-3 text-lg text-gray-600">Compress your photos to stay under any target size — 100% in-browser, private & free</p>
    </div>

    <!-- Upload Button -->
    <div class="flex justify-center mb-10">
      <input type="file" id="folderInput" webkitdirectory directory multiple class="hidden" onchange="handleFolder(event)">
      <button onclick="document.getElementById('folderInput').click()"
              class="bg-blue-600 hover:bg-blue-700 text-white px-10 py-5 rounded-xl text-xl font-semibold shadow-md transition-all transform hover:scale-105">
        📂 Select Folder of Photos
      </button>
    </div>

    <!-- Status / Loading -->
    <div id="status" class="text-center text-gray-600 mb-8 min-h-[2rem]"></div>

    <!-- Files Section -->
    <div id="filesSection" class="hidden">
      <div class="bg-white border border-gray-200 rounded-2xl shadow-sm overflow-hidden">
        <div class="px-6 py-5 border-b border-gray-200 flex justify-between items-center">
          <h2 id="fileCount" class="text-xl font-semibold text-gray-900"></h2>
          <div class="text-right">
            <p class="text-sm text-gray-500">Original total size</p>
            <p id="origTotal" class="text-2xl font-bold text-blue-600"></p>
          </div>
        </div>

        <div class="max-h-80 overflow-y-auto">
          <table class="w-full text-sm text-left">
            <thead class="bg-gray-50 sticky top-0">
              <tr class="border-b border-gray-200">
                <th class="px-6 py-4 font-medium text-gray-700">Filename</th>
                <th class="px-6 py-4 font-medium text-gray-700 text-right">Size</th>
              </tr>
            </thead>
            <tbody id="fileListBody"></tbody>
          </table>
        </div>
      </div>

      <!-- Controls -->
      <div class="mt-10 bg-white border border-gray-200 rounded-2xl shadow-sm p-8">
        <label class="block text-sm font-medium text-gray-700 mb-3">Target total size (MB)</label>
        <input id="targetMB" type="number" value="27" step="0.1" min="1"
               class="w-36 px-5 py-4 bg-gray-50 border border-gray-300 rounded-xl text-3xl font-mono focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
        
        <button onclick="findOptimalQuality()"
                class="mt-8 w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-5 rounded-xl text-lg shadow-md transition-all transform hover:scale-[1.02]">
          🔍 Find Best Quality to Stay Under Target
        </button>
      </div>
    </div>

    <!-- Progress / Loading Overlay -->
    <div id="progress" class="hidden fixed inset-0 bg-white/80 backdrop-blur-sm z-50 flex items-center justify-center">
      <div class="text-center">
        <div class="spinner mx-auto mb-6"></div>
        <p class="text-xl font-medium text-gray-800">Processing images...</p>
        <p id="progressText" class="mt-3 text-gray-600"></p>
      </div>
    </div>

    <!-- Result -->
    <div id="result" class="hidden mt-12 bg-white border border-green-200 rounded-2xl shadow-sm p-10 text-center">
      <p class="text-sm uppercase tracking-wide text-green-600 font-medium mb-2">Optimal Quality Found</p>
      <p id="optimalQuality" class="text-7xl font-bold text-gray-900">100%</p>
      <p class="mt-4 text-xl text-gray-600">New total size</p>
      <p id="newTotal" class="text-5xl font-bold text-green-600 mt-1">4.2 MB</p>
      
      <button onclick="compressAndDownload()"
              class="mt-10 w-full max-w-md mx-auto bg-green-600 hover:bg-green-700 text-white font-bold py-6 rounded-xl text-xl shadow-lg transition-all transform hover:scale-[1.02]">
        ⬇️ Download Compressed ZIP
      </button>
    </div>
  </div>

  <script>
    let loadedImages = [];
    let optimalQuality = 1.0;
    let targetBytes = 27 * 1024 * 1024;

    function isImageFile(file) {
      const ext = file.name.toLowerCase();
      return /\.(jpg|jpeg|png|heic|heif|webp|gif|bmp)$/i.test(ext) || file.type.startsWith('image/');
    }

    async function handleFolder(e) {
      const files = Array.from(e.target.files).filter(isImageFile);
      if (files.length === 0) {
        document.getElementById('status').innerHTML = '<p class="text-red-600">No image files found in the selected folder.</p>';
        return;
      }

      document.getElementById('status').innerHTML = `<p class="text-blue-600 font-medium">Loading ${files.length} images... (HEIC/HEIF conversion may take a few seconds)</p>`;
      loadedImages = [];
      let skipped = 0;

      for (const file of files) {
        let blob = file;
        let displayName = file.name;

        const isHeic = await HeicTo.isHeic(file).catch(() => false);
        if (isHeic) {
          try {
            blob = await HeicTo({ blob: file, type: 'image/jpeg', quality: 0.98 });
            displayName = displayName.replace(/\.(heic|heif)$/i, '.jpg');
          } catch (err) {
            console.error(`HEIC failed: ${file.name}`, err);
            skipped++;
            continue;
          }
        }

        const url = URL.createObjectURL(blob);
        const img = new Image();
        img.src = url;

        await new Promise((resolve) => {
          img.onload = resolve;
          img.onerror = () => { skipped++; resolve(); };
        });

        if (img.naturalWidth === 0 || img.naturalHeight === 0) {
          skipped++;
          URL.revokeObjectURL(url);
          continue;
        }

        loadedImages.push({
          name: displayName.replace(/\.\w+$/i, '.jpg'),
          origName: file.name,
          origSize: file.size,
          img,
          preloadUrl: url
        });
      }

      renderFileList();
      document.getElementById('filesSection').classList.remove('hidden');

      let msg = `Ready — ${loadedImages.length} images loaded`;
      if (skipped > 0) msg += ` (${skipped} skipped)`;
      document.getElementById('status').innerHTML = `<p class="text-green-600 font-medium">${msg}</p>`;
    }

    function renderFileList() {
      const total = loadedImages.reduce((sum, i) => sum + i.origSize, 0);
      const totalMB = (total / 1024 / 1024).toFixed(2);

      document.getElementById('fileCount').textContent = `${loadedImages.length} photos`;
      document.getElementById('origTotal').textContent = `${totalMB} MB`;

      let html = '';
      loadedImages.forEach(item => {
        const mb = (item.origSize / 1024 / 1024).toFixed(2);
        html += `
          <tr class="border-b border-gray-100 hover:bg-gray-50">
            <td class="px-6 py-4">${item.origName}</td>
            <td class="px-6 py-4 text-right font-mono text-gray-700">${mb} MB</td>
          </tr>`;
      });
      document.getElementById('fileListBody').innerHTML = html;
    }

    async function getCompressedBlobs(quality) {
      return Promise.all(loadedImages.map(async item => {
        const canvas = document.createElement('canvas');
        canvas.width = item.img.width;
        canvas.height = item.img.height;
        canvas.getContext('2d').drawImage(item.img, 0, 0);
        const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', quality));
        return { name: item.name, blob, size: blob.size };
      }));
    }

    async function getTotalSize(quality) {
      const items = await getCompressedBlobs(quality);
      return items.reduce((sum, i) => sum + i.size, 0);
    }

    async function findOptimalQuality() {
      const targetInput = parseFloat(document.getElementById('targetMB').value) || 27;
      targetBytes = targetInput * 1024 * 1024;

      const origTotal = loadedImages.reduce((sum, i) => sum + i.origSize, 0);
      if (origTotal <= targetBytes) {
        optimalQuality = 1.0;
        showResult(1.0, origTotal);
        return;
      }

      document.getElementById('progress').classList.remove('hidden');
      document.getElementById('filesSection').classList.add('opacity-50');

      let low = 0.1, high = 1.0;
      let bestQ = 0.1;
      let bestTotal = Infinity;

      for (let i = 0; i < 12; i++) {
        const mid = (low + high) / 2;
        const total = await getTotalSize(mid);
        const totalMB = (total / 1024 / 1024).toFixed(1);

        document.getElementById('progressText').textContent = 
          `Testing quality ${Math.round(mid*100)}% — ${totalMB} MB`;

        if (total <= targetBytes) {
          bestQ = mid;
          bestTotal = total;
          low = mid;
        } else {
          high = mid;
        }
      }

      document.getElementById('progress').classList.add('hidden');
      document.getElementById('filesSection').classList.remove('opacity-50');
      optimalQuality = Math.max(bestQ, 0.1);
      showResult(optimalQuality, bestTotal);
    }

    function showResult(q, totalBytes) {
      const totalMB = (totalBytes / 1024 / 1024).toFixed(1);
      document.getElementById('optimalQuality').textContent = Math.round(q * 100) + '%';
      document.getElementById('newTotal').textContent = `${totalMB} MB`;
      document.getElementById('result').classList.remove('hidden');
    }

    async function compressAndDownload() {
      const btn = document.querySelector('#result button');
      btn.textContent = 'Compressing & Zipping...';
      btn.disabled = true;

      const items = await getCompressedBlobs(optimalQuality);
      const zip = new JSZip();
      items.forEach(item => zip.file(item.name, item.blob));

      const zipBlob = await zip.generateAsync({ type: 'blob' });
      const url = URL.createObjectURL(zipBlob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `compressed_photos_under_${document.getElementById('targetMB').value}MB.zip`;
      a.click();
      URL.revokeObjectURL(url);

      btn.textContent = '⬇️ Download Compressed ZIP';
      btn.disabled = false;
    }

    window.addEventListener('beforeunload', () => {
      loadedImages.forEach(item => URL.revokeObjectURL(item.preloadUrl));
    });
  </script>
</body>
</html>
