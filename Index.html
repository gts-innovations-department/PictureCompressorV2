<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Compressor</title>

<!-- Compression -->
<script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>

<!-- HEIC Conversion -->
<script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>

<!-- ZIP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body {
    background:#121212;
    color:white;
    font-family:Segoe UI;
    display:flex;
    justify-content:center;
    padding:40px;
}

.card {
    width:700px;
    background:#1e1e1e;
    padding:20px;
    border-radius:12px;
    border:2px solid #2a2a2a;
}

button {
    padding:10px 16px;
    margin-right:10px;
    border:none;
    border-radius:8px;
    background:#4caf50;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.progress {
    width:100%;
    height:20px;
    background:#333;
    border-radius:10px;
    margin-top:10px;
}

.bar {
    height:100%;
    width:0%;
    background:#1e90ff;
    border-radius:10px;
    transition:width 0.2s;
}

pre {
    margin-top:15px;
    background:#111;
    padding:15px;
    border-radius:8px;
    color:#1e90ff;
    max-height:250px;
    overflow:auto;
}
</style>
</head>

<body>

<div class="card">
    <input type="file" id="folderInput" webkitdirectory multiple>

    <div style="margin-top:10px;">
        <button onclick="start(512)">Compress to 512 KB</button>
        <button onclick="start(300)">Compress to 300 KB</button>
        <button onclick="start(70)">Compress to 70 KB</button>
    </div>

    <div class="progress"><div class="bar" id="bar"></div></div>

    <pre id="log"></pre>
</div>

<script>
const log = document.getElementById("log");
const bar = document.getElementById("bar");

function write(text) {
    log.textContent += text + "\n";
    log.scrollTop = log.scrollHeight;
}

// Detect HEIC
function isHeic(file) {
    return (
        file.type === "image/heic" ||
        file.type === "image/heif" ||
        file.name.toLowerCase().endsWith(".heic") ||
        file.name.toLowerCase().endsWith(".heif")
    );
}

// Convert HEIC → JPEG and compress dynamically
async function convertAndCompress(file, maxKB) {
    let blob = file;

    if (isHeic(file)) {
        write("CONVERTING: " + file.name);

        const convertedBlob = await heic2any({
            blob: file,
            toType: "image/jpeg",
            quality: 1.0
        });

        blob = new File(
            [convertedBlob],
            file.name.replace(/\.(heic|heif)$/i, ".jpg"),
            { type: "image/jpeg" }
        );
    }

    // Compress to target KB
    const compressed = await imageCompression(blob, {
        maxSizeMB: maxKB / 1024,
        useWebWorker: true,
        maxWidthOrHeight: 8192
    });

    return compressed;
}

// Main
async function start(maxKB) {
    const input = document.getElementById("folderInput");
    const files = Array.from(input.files);

    if (!files.length) return alert("Select a folder first");

    const images = files.filter(f =>
        f.type.startsWith("image/") ||
        f.name.match(/\.(jpg|jpeg|png|webp|heic|heif)$/i)
    );

    log.textContent = "";
    bar.style.width = "0%";
    bar.style.background = "#1e90ff";

    write(`Starting compression to ${maxKB} KB`);
    write(`Total images: ${images.length}\n`);

    const zip = new JSZip();
    let done = 0;

    for (const file of images) {
        try {
            const finalFile = await convertAndCompress(file, maxKB);
            zip.file(finalFile.name, finalFile);

            done++;
            bar.style.width = Math.round((done / images.length) * 100) + "%";
            write("DONE: " + finalFile.name);

        } catch (e) {
            write("ERROR: " + file.name);
            console.error(e);
        }
    }

    write("\nCreating ZIP...");

    const blob = await zip.generateAsync({ type: "blob" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "compressed_images.zip";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);

    bar.style.background = "#4caf50";
    write("\n✅ Finished");
}
</script>

</body>
</html>
